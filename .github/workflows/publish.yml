name: Publish npm package

on:
  push:
    branches:
      - main

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        shell: bash

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate workspace
        run: |
          npm run check
          npm test
          npm run build

      - name: Detect unpublished package version
        id: package-version
        working-directory: packages/plugin
        run: |
          package_name=$(npm pkg get name --workspaces=false | tr -d '"')
          package_version=$(npm pkg get version --workspaces=false | tr -d '"')

          if npm view "$package_name@$package_version" version >/dev/null 2>&1; then
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
            echo "$package_name@$package_version is already published"
          else
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
            echo "$package_name@$package_version will be published"
          fi

      - name: Publish package to npm
        if: steps.package-version.outputs.should_publish == 'true'
        working-directory: packages/plugin
        run: npm publish --provenance
